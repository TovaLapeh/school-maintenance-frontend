<mat-sidenav-container class="app-shell">
  <mat-sidenav #sidenav [mode]="isHandset() ? 'over' : 'side'" [opened]="!isHandset()">
    <div class="sidenav-header">
      <h2>מערכת ניהול</h2>
      <p>תחזוקת מוסד</p>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/tasks" routerLinkActive="active-link">
        <mat-icon matListItemIcon>assignment</mat-icon>
        <span matListItemTitle>משימות</span>
      </a>
      <a mat-list-item routerLink="/users" routerLinkActive="active-link">
        <mat-icon matListItemIcon>group</mat-icon>
        <span matListItemTitle>משתמשים</span>
      </a>
      <a mat-list-item routerLink="/users/create" routerLinkActive="active-link">
        <mat-icon matListItemIcon>person_add</mat-icon>
        <span matListItemTitle>הוספת משתמש</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="toolbar">
      <button mat-icon-button (click)="sidenav.toggle()" *ngIf="isHandset()">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">מערכת ניהול תחזוקת מוסד</span>
    </mat-toolbar>

    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
