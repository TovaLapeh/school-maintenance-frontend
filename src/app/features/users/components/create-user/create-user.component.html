<mat-card>
  <mat-card-header>
    <mat-card-title>Create User</mat-card-title>
    <mat-card-subtitle>Add a new school system user</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="userForm" (ngSubmit)="submit()" class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Full name</mat-label>
        <input matInput formControlName="full_name" />
        <mat-error *ngIf="userForm.get('full_name')?.hasError('required')">Name is required.</mat-error>
        <mat-error *ngIf="userForm.get('full_name')?.hasError('minlength')">Minimum 2 characters.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" />
        <mat-error *ngIf="userForm.get('email')?.hasError('required')">Email is required.</mat-error>
        <mat-error *ngIf="userForm.get('email')?.hasError('email')">Enter a valid email.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Role</mat-label>
        <mat-select formControlName="role">
          <mat-option *ngFor="let role of roles" [value]="role">{{ role }}</mat-option>
        </mat-select>
      </mat-form-field>

      <div class="actions">
        <button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting">
          <span *ngIf="!isSubmitting">Create User</span>
          <mat-spinner *ngIf="isSubmitting" diameter="20"></mat-spinner>
        </button>
        <button mat-stroked-button type="button" routerLink="/users">Cancel</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
