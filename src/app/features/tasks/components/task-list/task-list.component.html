<mat-card class="task-list-card">
  <div class="list-header">
    <h3>רשימת משימות - {{ getCategoryLabel(category) }}</h3>
    <button mat-flat-button color="primary" (click)="startNewTask()">
      <mat-icon>add</mat-icon>
      + הוסף חדש
    </button>
  </div>

  <div *ngIf="isLoading" class="spinner-row">
    <mat-spinner diameter="36"></mat-spinner>
  </div>

  <div *ngIf="!isLoading && tasks.length === 0" class="empty-state">
    <p>אין משימות להצגה עדיין.</p>
  </div>

  <table *ngIf="!isLoading && tasks.length > 0" mat-table [dataSource]="tasks" class="task-table">
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef>כותרת</th>
      <td mat-cell *matCellDef="let task">{{ task.title }}</td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>תיאור</th>
      <td mat-cell *matCellDef="let task">{{ task.description }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>סטטוס</th>
      <td mat-cell *matCellDef="let task">{{ getStatusLabel(task.status) }}</td>
    </ng-container>

    <ng-container matColumnDef="priority">
      <th mat-header-cell *matHeaderCellDef>עדיפות</th>
      <td mat-cell *matCellDef="let task">{{ getPriorityLabel(task.priority) }}</td>
    </ng-container>

    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>תאריך</th>
      <td mat-cell *matCellDef="let task">{{ task.dueDate || task.createdDate | date: 'dd/MM/yyyy' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>פעולות</th>
      <td mat-cell *matCellDef="let task">
        <button mat-icon-button color="primary" (click)="view.emit(task)"><mat-icon>visibility</mat-icon></button>
        <button mat-icon-button color="accent" (click)="edit.emit(task)"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button color="warn" (click)="delete.emit(task)"><mat-icon>delete</mat-icon></button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</mat-card>
