<section class="tasks-page">
  <div class="page-header">
    <h2>מערכת ניהול תחזוקת מוסד</h2>
    <p>ניהול משימות רכש, תיקונים, שיפוצים, סדר וארגון וניקיון</p>
  </div>

  <mat-tab-group [selectedIndex]="getSelectedIndex()" (selectedTabChange)="onTabChange(tabs[$event.index].key)">
    <mat-tab *ngFor="let tab of tabs" [label]="tab.label"></mat-tab>
  </mat-tab-group>

  <div class="toolbar-row">
    <button mat-flat-button color="primary" (click)="openCreate()">
      <mat-icon>add</mat-icon>
      + הוסף חדש
    </button>
  </div>

  <app-task-list
    [tasks]="tasks"
    [isLoading]="isLoading"
    [category]="selectedCategory"
    (view)="openDetails($event)"
    (edit)="openEdit($event)"
    (delete)="deleteTask($event)">
  </app-task-list>

  <div class="form-panel" *ngIf="showForm">
    <app-task-form [task]="editingTask" [category]="selectedCategory" (saved)="saveTask()" (canceled)="showForm = false"></app-task-form>
  </div>

  <div class="details-panel" *ngIf="selectedTask">
    <app-task-details [task]="selectedTask" (close)="selectedTask = undefined"></app-task-details>
  </div>
</section>
